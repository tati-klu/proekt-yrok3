<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #0f0f1a;
      --muted: #5c5c72;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.12);
      --surface: rgba(255, 255, 255, 0.72);
      --stroke: rgba(255, 255, 255, 0.55);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
      background: #0c0c14;
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -50%;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.45), transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(236, 72, 153, 0.35), transparent 50%),
        radial-gradient(ellipse 70% 50% at 60% 80%, rgba(34, 211, 238, 0.25), transparent 55%);
      animation: bg-drift 18s ease-in-out infinite alternate;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(64px);
      opacity: 0.55;
      animation: float 12s ease-in-out infinite;
    }

    .orb--1 {
      width: min(45vw, 380px);
      height: min(45vw, 380px);
      background: #6366f1;
      top: -10%;
      left: -5%;
      animation-delay: 0s;
    }

    .orb--2 {
      width: min(40vw, 320px);
      height: min(40vw, 320px);
      background: #ec4899;
      bottom: -15%;
      right: -8%;
      animation-delay: -4s;
      animation-duration: 14s;
    }

    .orb--3 {
      width: min(30vw, 240px);
      height: min(30vw, 240px);
      background: #22d3ee;
      top: 40%;
      left: 35%;
      opacity: 0.35;
      animation-delay: -2s;
      animation-duration: 16s;
    }

    @keyframes bg-drift {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        transform: translate(3%, 2%) rotate(3deg) scale(1.05);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0);
      }
      33% {
        transform: translate(12px, -18px);
      }
      66% {
        transform: translate(-8px, 10px);
      }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 28rem;
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--stroke);
      border-radius: 20px;
      padding: 2rem 2rem 1.75rem;
      box-shadow:
        0 4px 24px rgba(15, 15, 26, 0.12),
        0 24px 64px rgba(99, 102, 241, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      animation: card-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      animation: fade-slide 0.6s ease 0.15s both;
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.15);
      }
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: var(--ink);
      animation: fade-slide 0.65s ease 0.25s both;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .list li {
      position: relative;
      margin: 0;
      padding: 0.95rem 1rem 0.95rem 2.85rem;
      line-height: 1.45;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: default;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease,
        border-color 0.35s ease,
        color 0.25s ease;
      animation: item-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .list li:nth-child(1) { animation-delay: 0.4s; }
    .list li:nth-child(2) { animation-delay: 0.52s; }
    .list li:nth-child(3) { animation-delay: 0.64s; }

    @keyframes item-in {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .list li::before {
      content: attr(data-n);
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.5rem;
      height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), background 0.25s ease;
    }

    .list li:hover {
      color: var(--ink);
      transform: translateX(4px);
      border-color: rgba(99, 102, 241, 0.25);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.12);
    }

    .list li:hover::before {
      transform: translateY(-50%) scale(1.08);
      background: rgba(99, 102, 241, 0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      .scene::before,
      .orb,
      .badge::before,
      main,
      .badge,
      h1,
      .list li {
        animation: none;
      }
      main {
        opacity: 1;
        transform: none;
      }
      .list li {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>
  <main>
    <p class="badge">Контент-студия</p>
    <h1>Генератор идей для постов</h1>
    <ul class="list">
      <li data-n="1">5 идей постов для экспертов</li>
      <li data-n="2">3 идеи сторис на сегодня</li>
      <li data-n="3">контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
